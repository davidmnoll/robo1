name: Build API Image

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - '.github/workflows/build-api.yml'
  workflow_dispatch:

env:
  PROJECT_ID: robo1-489405
  IMAGE_NAME: robot-gateway

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_TERRAFORM_TOKEN }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker auth for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and push
        run: |
          IMAGE="gcr.io/${PROJECT_ID}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker build -t "${IMAGE}" ./api
          docker push "${IMAGE}"
          docker tag "${IMAGE}" "gcr.io/${PROJECT_ID}/${IMAGE_NAME}:latest"
          docker push "gcr.io/${PROJECT_ID}/${IMAGE_NAME}:latest"
