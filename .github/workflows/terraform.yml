name: Terraform Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
      - 'api/**'
      - 'ros/**'
      - 'web/**'
  workflow_dispatch:

env:
  PROJECT_ID: robo1-489405
  TF_WORKING_DIR: terraform

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api_or_tf: ${{ steps.results.outputs.api_or_tf }}
      web: ${{ steps.results.outputs.web }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        with:
          list-files: none
          filters: |
            api_or_tf:
              - 'api/**'
              - 'ros/**'
              - 'terraform/**'
              - '.github/workflows/terraform.yml'
            web:
              - 'web/**'

      - name: Set change outputs
        id: results
        env:
          EVENT_NAME: ${{ github.event_name }}
          FILTER_API_OR_TF: ${{ steps.filter.outputs.api_or_tf }}
          FILTER_WEB: ${{ steps.filter.outputs.web }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            API_OR_TF=true
            WEB=true
          else
            API_OR_TF=${FILTER_API_OR_TF:-false}
            WEB=${FILTER_WEB:-false}
          fi
          echo "api_or_tf=${API_OR_TF}" >> "${GITHUB_OUTPUT}"
          echo "web=${WEB}" >> "${GITHUB_OUTPUT}"

  terraform:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api_or_tf == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    outputs:
      api_url: ${{ steps.tf_outputs.outputs.api_url }}
      api_vm_name: ${{ steps.tf_outputs.outputs.api_vm_name }}
      api_vm_zone: ${{ steps.tf_outputs.outputs.api_vm_zone }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_TERRAFORM_TOKEN }}

      - name: Configure gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Ensure terraform state bucket exists
        run: |
          gsutil ls -b gs://robo1-terraform-state >/dev/null 2>&1 || \
            gsutil mb -p "${PROJECT_ID}" gs://robo1-terraform-state

      - name: Configure Docker auth for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Ensure API image exists
        id: ensure_image
        env:
          IMAGE: gcr.io/${{ env.PROJECT_ID }}/robot-gateway:${{ github.sha }}
        run: |
          set -euo pipefail
          if ! gcloud container images list-tags "gcr.io/${PROJECT_ID}/robot-gateway" \
              --filter="tags:${GITHUB_SHA}" --format="get(digest)" | grep -q .; then
            echo "API image ${IMAGE} missing; building..."
            docker build -t "${IMAGE}" ./api
            docker push "${IMAGE}"
            docker tag "${IMAGE}" "gcr.io/${PROJECT_ID}/robot-gateway:latest"
            docker push "gcr.io/${PROJECT_ID}/robot-gateway:latest"
          else
            echo "API image ${IMAGE} already exists."
          fi
          echo "TF_VAR_api_image=${IMAGE}" >> "${GITHUB_ENV}"
          echo "api_image=${IMAGE}" >> "${GITHUB_OUTPUT}"

      - name: Extract CI service account email
        id: ci_sa
        run: |
          CI_SA_EMAIL=$(jq -r '.client_email' "${GOOGLE_APPLICATION_CREDENTIALS}")
          echo "email=${CI_SA_EMAIL}" >> "${GITHUB_OUTPUT}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false -out=tfplan
        env:
          TF_VAR_project_id: ${{ env.PROJECT_ID }}
          TF_VAR_region: us-central1
          TF_VAR_zone: us-central1-a
          TF_VAR_api_image: ${{ steps.ensure_image.outputs.api_image }}
          TF_VAR_ci_service_account_email: ${{ steps.ci_sa.outputs.email }}

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false -auto-approve tfplan
        env:
          TF_VAR_project_id: ${{ env.PROJECT_ID }}
          TF_VAR_region: us-central1
          TF_VAR_zone: us-central1-a
          TF_VAR_api_image: ${{ steps.ensure_image.outputs.api_image }}
          TF_VAR_ci_service_account_email: ${{ steps.ci_sa.outputs.email }}

      - name: Capture Terraform outputs
        if: github.ref == 'refs/heads/main'
        id: tf_outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set -euo pipefail
          API_URL=$(terraform output -raw api_url)
          VM_NAME=$(terraform output -raw api_vm_name)
          VM_ZONE=$(terraform output -raw api_vm_zone)
          echo "api_url=${API_URL}" >> "${GITHUB_OUTPUT}"
          echo "api_vm_name=${VM_NAME}" >> "${GITHUB_OUTPUT}"
          echo "api_vm_zone=${VM_ZONE}" >> "${GITHUB_OUTPUT}"

      - name: Deploy API container via SSH
        if: github.ref == 'refs/heads/main'
        env:
          API_VM_NAME: ${{ steps.tf_outputs.outputs.api_vm_name }}
          API_VM_ZONE: ${{ steps.tf_outputs.outputs.api_vm_zone }}
          IMAGE: ${{ steps.ensure_image.outputs.api_image }}
        run: |
          set -euo pipefail
          echo "Deploying ${IMAGE} to ${API_VM_NAME} in ${API_VM_ZONE}..."
          # Retry loop to handle IAM propagation delays
          for i in $(seq 1 5); do
            if gcloud compute ssh "${API_VM_NAME}" \
                --project="${PROJECT_ID}" \
                --zone="${API_VM_ZONE}" \
                --tunnel-through-iap \
                --command="sudo docker pull ${IMAGE} && sudo docker rm -f robot-gateway 2>/dev/null || true && sudo docker run -d --name robot-gateway --network host --restart=always --env-file /etc/robot-gateway/env ${IMAGE}"; then
              echo "Deploy succeeded on attempt ${i}"
              exit 0
            fi
            echo "Attempt ${i}/5 failed, waiting 30s..."
            sleep 30
          done
          echo "Deploy failed after 5 attempts" >&2
          exit 1

      - name: Verify API health
        if: github.ref == 'refs/heads/main'
        env:
          API_URL: ${{ steps.tf_outputs.outputs.api_url }}
        run: |
          set -euo pipefail
          HEALTH_URL="${API_URL%/}/api/health"
          echo "Waiting for API at ${HEALTH_URL}..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "${HEALTH_URL}" 2>/dev/null || true)
            if [ "${STATUS}" = "200" ]; then
              echo "API is healthy (attempt ${i})"
              exit 0
            fi
            echo "Attempt ${i}/30: status=${STATUS}, retrying in 5s..."
            sleep 5
          done
          echo "API failed to become healthy after 150s" >&2
          exit 1

  deploy_dashboard:
    runs-on: ubuntu-latest
    needs:
      - changes
      - terraform
    if: github.ref == 'refs/heads/main' &&
        (needs.terraform.result == 'success' || needs.terraform.result == 'skipped') &&
        (needs.changes.outputs.web == 'true' || needs.changes.outputs.api_or_tf == 'true' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      GATEWAY_URL: ${{ needs.terraform.outputs.api_url }}
    concurrency:
      group: pages
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_TERRAFORM_TOKEN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Fetch gateway URL
        id: fetch_url
        env:
          TERRAFORM_OUTPUT_URL: ${{ needs.terraform.outputs.api_url }}
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set -euo pipefail
          if [ -n "${TERRAFORM_OUTPUT_URL}" ]; then
            echo "GATEWAY_URL=${TERRAFORM_OUTPUT_URL}" >> "${GITHUB_ENV}"
            exit 0
          fi
          terraform init -input=false >/dev/null
          GATEWAY_URL=$(terraform output -raw api_url)
          echo "GATEWAY_URL=${GATEWAY_URL}" >> "${GITHUB_ENV}"

      - name: Install dashboard dependencies
        working-directory: web
        run: npm ci

      - name: Build dashboard
        working-directory: web
        env:
          GATEWAY_URL: ${{ env.GATEWAY_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${GATEWAY_URL:-}" ]; then
            echo "Gateway URL missing; cannot build dashboard" >&2
            exit 1
          fi
          API_BASE="${GATEWAY_URL%/}/api"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_PATH="/${REPO_NAME}/"
          echo "Building dashboard with API base ${API_BASE} and base path ${BASE_PATH}"
          VITE_API_BASE_URL="${API_BASE}" VITE_BASE_PATH="${BASE_PATH}" npm run build

      - name: Prepare dashboard artifact
        run: |
          set -euo pipefail
          DEPLOY_DIR=dashboard-dist
          rm -rf "${DEPLOY_DIR}"
          cp -R web/dist "${DEPLOY_DIR}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard-dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
