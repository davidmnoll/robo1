name: Terraform Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
      - 'api/**'
      - 'ros/**'
      - 'web/**'
  workflow_dispatch:

env:
  PROJECT_ID: robo1-489405
  TF_WORKING_DIR: terraform

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api_or_tf: ${{ steps.results.outputs.api_or_tf }}
      web: ${{ steps.results.outputs.web }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: filter
        if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        with:
          list-files: none
          filters: |
            api_or_tf:
              - 'api/**'
              - 'ros/**'
              - 'terraform/**'
              - '.github/workflows/terraform.yml'
            web:
              - 'web/**'

      - name: Set change outputs
        id: results
        env:
          EVENT_NAME: ${{ github.event_name }}
          FILTER_API_OR_TF: ${{ steps.filter.outputs.api_or_tf }}
          FILTER_WEB: ${{ steps.filter.outputs.web }}
        run: |
          set -euo pipefail
          if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
            API_OR_TF=true
            WEB=true
          else
            API_OR_TF=${FILTER_API_OR_TF:-false}
            WEB=${FILTER_WEB:-false}
          fi
          echo "api_or_tf=${API_OR_TF}" >> "${GITHUB_OUTPUT}"
          echo "web=${WEB}" >> "${GITHUB_OUTPUT}"

  terraform:
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.api_or_tf == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
    outputs:
      cloud_run_url: ${{ steps.tf_outputs.outputs.cloud_run_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_TERRAFORM_TOKEN }}

      - name: Configure gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Ensure terraform state bucket exists
        run: |
          gsutil ls -b gs://robo1-terraform-state >/dev/null 2>&1 || \
            gsutil mb -p "${PROJECT_ID}" gs://robo1-terraform-state

      - name: Configure Docker auth for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Ensure API image exists
        env:
          IMAGE: gcr.io/${{ env.PROJECT_ID }}/robot-gateway:${{ github.sha }}
        run: |
          set -euo pipefail
          if ! gcloud container images list-tags "gcr.io/${PROJECT_ID}/robot-gateway" \
              --filter="tags:${GITHUB_SHA}" --format="get(digest)" | grep -q .; then
            echo "API image ${IMAGE} missing; building..."
            docker build -t "${IMAGE}" ./api
            docker push "${IMAGE}"
            docker tag "${IMAGE}" "gcr.io/${PROJECT_ID}/robot-gateway:latest"
            docker push "gcr.io/${PROJECT_ID}/robot-gateway:latest"
          else
            echo "API image ${IMAGE} already exists."
          fi
          echo "TF_VAR_api_image=${IMAGE}" >> "${GITHUB_ENV}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -input=false -out=tfplan
        env:
          TF_VAR_project_id: ${{ env.PROJECT_ID }}
          TF_VAR_region: us-central1

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false -auto-approve tfplan
        env:
          TF_VAR_project_id: ${{ env.PROJECT_ID }}
          TF_VAR_region: us-central1

      - name: Capture Terraform outputs
        if: github.ref == 'refs/heads/main'
        id: tf_outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set -euo pipefail
          CLOUD_RUN_URL=$(terraform output -raw cloud_run_url)
          echo "cloud_run_url=${CLOUD_RUN_URL}" >> "${GITHUB_OUTPUT}"

  deploy_dashboard:
    runs-on: ubuntu-latest
    needs:
      - changes
      - terraform
    if: github.ref == 'refs/heads/main' &&
        (needs.terraform.result == 'success' || needs.terraform.result == 'skipped')
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    env:
      CLOUD_RUN_URL: ${{ needs.terraform.outputs.cloud_run_url }}
    concurrency:
      group: pages
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_TERRAFORM_TOKEN }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Fetch Cloud Run URL
        id: fetch_url
        env:
          TERRAFORM_OUTPUT_URL: ${{ needs.terraform.outputs.cloud_run_url }}
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set -euo pipefail
          if [ -n "${TERRAFORM_OUTPUT_URL}" ]; then
            echo "CLOUD_RUN_URL=${TERRAFORM_OUTPUT_URL}" >> "${GITHUB_ENV}"
            exit 0
          fi
          terraform init -input=false >/dev/null
          CLOUD_RUN_URL=$(terraform output -raw cloud_run_url)
          echo "CLOUD_RUN_URL=${CLOUD_RUN_URL}" >> "${GITHUB_ENV}"

      - name: Install dashboard dependencies
        working-directory: web
        run: npm ci

      - name: Build dashboard
        working-directory: web
        env:
          CLOUD_RUN_URL: ${{ env.CLOUD_RUN_URL }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUD_RUN_URL:-}" ]; then
            echo "Cloud Run URL missing; cannot build dashboard" >&2
            exit 1
          fi
          API_BASE="${CLOUD_RUN_URL%/}/api"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          BASE_PATH="/${REPO_NAME}/"
          echo "Building dashboard with API base ${API_BASE} and base path ${BASE_PATH}"
          VITE_API_BASE_URL="${API_BASE}" VITE_BASE_PATH="${BASE_PATH}" npm run build

      - name: Prepare dashboard artifact
        run: |
          set -euo pipefail
          DEPLOY_DIR=dashboard-dist
          rm -rf "${DEPLOY_DIR}"
          cp -R web/dist "${DEPLOY_DIR}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard-dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
