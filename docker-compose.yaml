version: "3.9"

networks:
  robotnet:
    driver: bridge

services:
  db:
    image: postgres:15
    container_name: arena-db
    environment:
      - POSTGRES_USER=robot
      - POSTGRES_PASSWORD=robot
      - POSTGRES_DB=robotarena
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - robotnet

  ros-core:
    build:
      context: ./ros
    container_name: ros-core
    environment:
      - ROS_DOMAIN_ID=0
      - CAMERA_NAMESPACES=bot_alpha,bot_beta
      - API_BASE_URL=http://robot-gateway:8080/api
      - ROS_PUSH_KEY=${ROS_PUSH_KEY:-local-dev-key}
    ports:
      - "9090:9090"      # rosbridge websocket
      - "11811:11811/udp" # ROS2 Discovery Server
      - "51820:51820/udp" # WireGuard VPN
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - ./ros/wireguard:/etc/wireguard:ro
    networks:
      - robotnet

  sim:
    build:
      context: ./sim
    container_name: sim-runner
    environment:
      - ROS_DOMAIN_ID=0
      - WEBOTS_WORLD=/workspace/worlds/turtlebot_apartment.wbt
      - ROS_DISCOVERY_SERVER=ros-core:11811
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - BOT_LOG_DIR=/tmp/bot_logs
    volumes:
      - ./sim/worlds:/workspace/worlds:ro
    depends_on:
      - ros-core
    networks:
      - robotnet

  api:
    build:
      context: ./api
    container_name: robot-gateway
    environment:
      - ROS_PUSH_KEY=${ROS_PUSH_KEY:-local-dev-key}
      - 'SEED_USERS_JSON=[{"email":"dmn322","password":"TEST123!"}]'
      - "SEED_LOBBIES_JSON=[{\"name\":\"ros-core\",\"description\":\"Default ROS core lobby\",\"access_key\":\"${ROS_PUSH_KEY:-local-dev-key}\",\"owner_email\":\"dmn322\",\"is_public\":true}]"
      - "SEED_BOTS_JSON=[{\"name\":\"Arena Bot Alpha\",\"ros_namespace\":\"bot_alpha\",\"lobby_name\":\"ros-core\",\"owner_email\":\"dmn322\"},{\"name\":\"Arena Bot Beta\",\"ros_namespace\":\"bot_beta\",\"lobby_name\":\"ros-core\",\"owner_email\":\"dmn322\"}]"
      - GATEWAY_NAME=gateway-1
      - DATABASE_URL=postgresql+asyncpg://robot:robot@db:5432/robotarena
      - SECRET_KEY=change-me-in-prod
      - ACCESS_TOKEN_EXPIRE_MINUTES=60
    ports:
      - "8081:8080"
    depends_on:
      - ros-core
      - db
    networks:
      - robotnet

  web:
    image: nginx:alpine
    container_name: arena-web
    volumes:
      - ./web/public:/usr/share/nginx/html:ro
      - ./web/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "4173:80"
    depends_on:
      - api
    networks:
      - robotnet

volumes:
  db_data:
